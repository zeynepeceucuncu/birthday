<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi ki Doğdun Rukoooo!</title>
    <style>
        /* Genel Sayfa Ayarları */
        body {
            background-color: #ffb6c1; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            position: relative;
        }

        /* --- Kalp Canvas --- */
        #heartCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; 
            pointer-events: none; 
        }

        h1 {
            color: #d81b60;
            font-size: 3rem;
            z-index: 10;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Buton Tasarımı - Tıklanmayı garantilemek için en üste alındı */
        #clickMe {
            position: relative;
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #ff69b4; 
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            z-index: 999; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s, background-color 0.2s;
        }
        #clickMe:hover { background-color: #ff1493; }
        #clickMe:active { transform: scale(0.95); }

        /* --- Zarf Tasarımı --- */
        #envelope-container {
            display: none; 
            position: relative;
            margin-top: 100px; /* Kağıt uzadığı için yukarıdan biraz daha boşluk bıraktık */
            width: 300px; 
            height: 190px; 
            z-index: 10; 
            perspective: 1000px; 
        }

        .envelope-back {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #b30000; 
            border-radius: 0 0 10px 10px;
            z-index: 1; 
        }

        /* Mektup Kâğıdı */
        .paper {
            position: absolute;
            bottom: 10px; 
            left: 2.5%;
            width: 95%;
            height: 380px; /* KAĞIT İYİCE UZATILDI: 340px'ten 380px'e çıktı */
            background-color: #fffaf0;
            z-index: 2; 
            padding: 20px; 
            box-sizing: border-box;
            font-size: 1rem; 
            line-height: 1.4;
            color: #333;
            text-align: center;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            
            opacity: 0; 
            visibility: hidden;
            transform: translateY(60px); 
            transition: transform 1.2s ease-in-out, opacity 0.5s ease-in; 
        }

        .envelope-front {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            height: 120px; 
            z-index: 3; 
            background-color: #ff3333; 
            border-radius: 0 0 10px 10px;
        }
        .envelope-front::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            border-left: 150px solid transparent; 
            border-right: 150px solid transparent; 
            border-top: 70px solid #cc0000; 
            z-index: 3;
        }

        .envelope-flap {
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 0;
            border-left: 150px solid transparent; 
            border-right: 150px solid transparent; 
            border-top: 105px solid #990000; 
            z-index: 4; 
            transform-origin: top; 
            transition: transform 0.6s ease-in-out, z-index 0s 0.3s;
        }

        /* Animasyonlar */
        .open-flap .envelope-flap {
            transform: rotateX(180deg); 
            z-index: 1; 
        }

        .pull-paper .paper {
            opacity: 1; 
            visibility: visible;
            transform: translateY(-130px); /* Kağıt uzadığı için yukarı süzülme mesafesi ayarlandı */
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <h1> Rukoooo! 🎉</h1>
    <button id="clickMe">There is a message for you </button>

    <div id="envelope-container">
        <div class="envelope-back"></div>
        <div class="envelope-flap"></div>
        <div class="paper" id="message-paper">
            <b>Anneciiiiiiim,</b><br><br>
            Bilgisayar Mühendisi kızın olduğu belli olsun dedim:) Doğum günün kutlu olsunnn 💛 bize hep bayramdı bu sene tüm islam alemininkiyle çakıştı 😂<br><br>
            Sana hediye olarak senden bir tane verebilseydik çok iyi olurdu anne 🤭 İyi ki Doğdun 🎂
        </div>
        <div class="envelope-front"></div>
    </div>
