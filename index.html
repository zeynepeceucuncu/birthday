<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi ki Doğdun Rukoooo!</title>
    <style>
        /* Genel Sayfa Ayarları */
        body {
            background-color: #ffb6c1; /* Tatlı pembe arka plan */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Sayfanın kaymasını engeller */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            position: relative;
        }

        /* --- Kalp Canvas (Animasyon) --- */
        #heartCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Diğer elementlerin arkasında dursun */
            pointer-events: none; /* Tıklamaları engellememesi için */
        }

        /* Başlık Texti */
        h1 {
            color: #d81b60;
            font-size: 3rem;
            z-index: 10;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* Buton Tasarımı */
        #clickMe {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #ff69b4;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s, background-color 0.2s;
        }
        #clickMe:hover { background-color: #ff1493; }
        #clickMe:active { transform: scale(0.95); }

        /* --- Gelişmiş Zarf Tasarımı (Kapalıdan Açığa) --- */
        #envelope-container {
            display: none; 
            position: relative;
            margin-top: 40px;
            width: 380px; 
            height: 240px; 
            z-index: 10; 
            perspective: 1000px; /* 3 Boyutlu açılma efekti için */
        }

        /* Katman 1: Zarfın Arka Paneli */
        .envelope-back {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #e69138; 
            border-radius: 0 0 10px 10px;
            z-index: 1; 
        }

        /* Katman 2: Mektup Kâğıdı (Ortada) */
        .paper {
            position: absolute;
            bottom: 10px; 
            left: 2.5%;
            width: 95%;
            height: 300px; 
            background-color: #fffaf0;
            z-index: 2; 
            padding: 25px; 
            box-sizing: border-box;
            font-size: 1.05rem;
            line-height: 1.4;
            color: #333;
            text-align: center;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 1.2s ease-in-out; /* Yavaşça süzülerek çıkma */
        }

        /* Katman 3: Zarfın Ön Paneli (Alt Cep) */
        .envelope-front {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            height: 150px; 
            z-index: 3; 
            background-color: #f4a460; 
            border-radius: 0 0 10px 10px;
        }
        .envelope-front::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            border-left: 190px solid transparent; 
            border-right: 190px solid transparent;
            border-top: 90px solid #e69138;
            z-index: 3;
        }

        /* Katman 4: Zarfın Üst Kapağı (Açılıp kapanan kısım) */
        .envelope-flap {
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 0;
            border-left: 190px solid transparent;
            border-right: 190px solid transparent;
            border-top: 135px solid #d38332; /* Arkadan biraz daha koyu, kat yeri belli olsun */
            z-index: 4; /* Kapalıyken en üstte */
            transform-origin: top; /* Üst kısımdan katlanacak */
            transition: transform 0.6s ease-in-out, z-index 0s 0.3s;
        }

        /* Animasyon 1: Kapağın Açılması */
        .open-flap .envelope-flap {
            transform: rotateX(180deg); /* Kapağı yukarı doğru çevirir */
            z-index: 1; /* Açıldığında mektubun arkasında kalması için z-index düşer */
        }

        /* Animasyon 2: Mektubun Çıkması */
        .pull-paper .paper {
            transform: translateY(-260px); 
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <h1> İyi ki Doğdun Rukoooo! 🎉</h1>
    <button id="clickMe">There is a message for you </button>

    <div id="envelope-container">
        <div class="envelope-back"></div>
        <div class="envelope-flap"></div> <div class="paper" id="message-paper">
            <b>Anneciiiiiiim,</b><br><br>
            Bilgisayar Mühendisi kızın olduğu belli olsun dedim:) Doğum günün kutlu olsunnn 💛 bize hep bayramdı bu sene tüm islam alemininkiyle çakıştı 😂<br><br>
            Sana hediye olarak senden bir tane verebilseydik çok iyi olurdu anne , hayat kaliten artardı 🤭 İyi ki Doğdun 🎂
        </div>
        <div class="envelope-front"></div>
    </div>

    <script>
        // --- Yavaş ve Zarif Kalp Animasyonu ---
        function startHearts() {
            const canvas = document.getElementById('heartCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            // Tatlı pembe ve kırmızı tonları
            const colors = ['#ff4b72', '#ff7aa2', '#ff1453', '#d81b60', '#ff8da1']; 

            class Heart {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    // Kalpler ekranın en altından, görünmez alandan başlasın
                    this.y = canvas.height + (Math.random() * 500); 
                    
                    this.velocity = {
                        y: -(Math.random() * 1.5 + 0.5) // Çok yavaş yukarı çıkış
                    };
                    
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.size = Math.random() * 15 + 10; // Boyutlar (10px - 25px arası)
                    this.opacity = Math.random() * 0.5 + 0.5; // Yarı saydamlık
                    
                    // Sağa sola rüzgar efekti için salınım değişkenleri
                    this.sway = Math.random() * Math.PI * 2; 
                    this.swaySpeed = Math.random() * 0.02 + 0.01; 
                }

                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.opacity;
                    ctx.fillStyle = this.color;
                    ctx.font = this.size + "px Arial";
                    ctx.textAlign = "center";
                    
                    // Hafif sağa sola sallanarak süzülme
                    let currentX = this.x + Math.sin(this.sway) * 20; 
                    
                    ctx.fillText("❤", currentX, this.y);
                    ctx.restore();
                }

                update() {
                    this.y += this.velocity.y;
                    this.sway += this.swaySpeed;
                    
                    // Kalp ekranın üstünden çıkarsa, onu tekrar en alta gönder (Sürekli döngü)
                    if (this.y < -50) {
                        this.y = canvas.height + 50;
                        this.x = Math.random() * canvas.width;
                    }
                }
            }

            // Ekranda aynı anda bulunacak kalp sayısı (sade olması için 60 adet ideal)
            for (let i = 0; i < 60; i++) {
                particles.push(new Heart());
            }

            function animate() {
                requestAnimationFrame(animate);
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particles.forEach(particle => {
                    particle.update();
                    particle.draw();
                });
            }

            animate();

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        // --- Adım Adım Zarf Açılma Mantığı ---
        const btn = document.getElementById('clickMe');
        const envContainer = document.getElementById('envelope-container');

        btn.addEventListener('click', () => {
            // Butonu gizle, kapalı zarfı göster
            btn.style.display = 'none';
            envContainer.style.display = 'block';
            
            // Arka planda kalpler süzülmeye başlasın
            startHearts(); 
            
            // 1. ADIM: Yarım saniye bekle ve zarfın kapağını aç
            setTimeout(() => {
                envContainer.classList.add('open-flap');
                
                // 2. ADIM: Kapak tamamen açıldıktan sonra (0.6sn) mektubu yukarı çıkar
                setTimeout(() => {
                    envContainer.classList.add('pull-paper');
                }, 600);

            }, 500); // Tıkladıktan sonra kapağın açılması için ufak bir bekleme süresi
        });
    </script>

</body>
</html>
