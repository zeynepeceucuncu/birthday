<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi ki Doğdun Rukoooo!</title>
    <style>
        /* Genel Sayfa Ayarları */
        body {
            background-color: #ffb6c1; /* Tatlı bir pembe */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Dışarı taşan kokinaları gizler */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            position: relative;
        }

        /* --- Hareketli Arka Plan Efekti (Bokeh/Işıltı) --- */
        .bg-animation {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; /* En arkada */
        }
        .bg-dot {
            position: absolute;
            background: rgba(255, 255, 255, 0.5); /* Şeffaf beyaz */
            border-radius: 50%;
            animation: drift infinite linear;
        }
        @keyframes drift {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-110vh); opacity: 0; }
        }

        /* Başlık Texti */
        h1 {
            color: #d81b60;
            font-size: 3rem;
            z-index: 10;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* Buton Tasarımı */
        #clickMe {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #ff69b4;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s, background-color 0.2s;
        }
        #clickMe:hover { background-color: #ff1493; }
        #clickMe:active { transform: scale(0.95); }

        /* --- Katmanlı Zarf ve Kâğıt Tasarımı (Düzeltildi) --- */
        #envelope-container {
            display: none; /* Başlangıçta gizli */
            position: relative;
            margin-top: 60px;
            width: 320px;
            height: 200px;
            z-index: 10;
        }

        /* Katman 1: Zarfın Arka Paneli */
        .envelope-back {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #e69138; /* Koyu taba */
            border-radius: 0 0 10px 10px;
            z-index: 1; /* En alt katman */
        }

        /* Katman 2: Mektup Kâğıdı (Ortada) */
        .paper {
            position: absolute;
            bottom: 10px; /* Zarfın içinde başla */
            left: 5%;
            width: 90%;
            height: 180px;
            background-color: #fffaf0;
            z-index: 2; /* Arka ve ön katman arasında */
            padding: 20px;
            box-sizing: border-box;
            font-size: 1.1rem;
            color: #333;
            text-align: center;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 1.2s ease-in-out;
        }

        /* Katman 3: Zarfın Ön Paneli (Üstte) */
        .envelope-front {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            height: 130px; /* Yüksekliği biraz azalttık ki kâğıt çıksın */
            z-index: 3; /* En üst katman */
            background-color: #f4a460; /* Açık taba */
            border-radius: 0 0 10px 10px;
        }
        /* Zarfın ön kapağındaki katlama efekti (V şekli) */
        .envelope-front::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 80px solid #e69138;
            z-index: 3;
        }

        /* Zarf açılma animasyonu tetikleyicisi */
        .open-envelope .paper {
            transform: translateY(-160px); /* Kâğıt dışarı çıksın */
        }

        /* Kokina Animasyonu (Fırlayıp düşme) */
        .kokina {
            position: absolute;
            bottom: -50px;
            font-size: 30px;
            z-index: 1;
            animation: popAndFall 4s ease-in-out forwards;
        }

        @keyframes popAndFall {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 1; }
            40% { transform: translateY(-85vh) scale(1.2) rotate(180deg); opacity: 1; }
            100% { transform: translateY(10vh) scale(1) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="bg-animation" id="bgAnimation"></div>

    <h1>İyi ki Doğdun Rukoooo! 🎉</h1>
    <button id="clickMe">There is am message for you</button>

    <div id="envelope-container">
        <div class="envelope-back"></div>
        <div class="paper" id="message-paper">
            Canım Rukooo, <br><br> Yeni yaşın sana sağlık, mutluluk ve bolca huzur getirsin. Seni çok seviyorum! ❤️
        </div>
        <div class="envelope-front"></div>
    </div>

    <script>
        // --- Sayfa Yüklenince Yapılacaklar ---
        window.onload = () => {
            // 1. Arka plan hareket efektini oluştur
            createBackgroundAnimation();
            
            // 2. Kokinaları fırlat
            startKokinaBurst();
        }

        // --- Arka Plan Bokeh Efekti ---
        function createBackgroundAnimation() {
            const bgContainer = document.getElementById('bgAnimation');
            for (let i = 0; i < 50; i++) {
                const dot = document.createElement('div');
                dot.classList.add('bg-dot');
                
                // Rastgele boyut (4px - 12px)
                const size = (Math.random() * 8 + 4) + 'px';
                dot.style.width = size;
                dot.style.height = size;
                
                // Rastgele yatay pozisyon
                dot.style.left = Math.random() * 100 + 'vw';
                dot.style.top = Math.random() * 100 + 'vh'; // Ekrana yayılması için top değeri
                
                // Rastgele animasyon süreleri ve gecikmeleri (scatter etkisi)
                dot.style.animationDuration = (Math.random() * 10 + 10) + 's'; 
                dot.style.animationDelay = (Math.random() * -20) + 's'; // Önceden başlamış gibi
                
                bgContainer.appendChild(dot);
            }
        }

        // --- Kokina Efekti ---
        function startKokinaBurst() {
            function createKokina() {
                const kokina = document.createElement('div');
                kokina.classList.add('kokina');
                kokina.innerHTML = '🍒'; // Kokina kirazı
                kokina.style.left = Math.random() * 100 + 'vw';
                kokina.style.animationDuration = (Math.random() * 2 + 3) + 's'; 
                document.body.appendChild(kokina);
                setTimeout(() => kokina.remove(), 5000); // Temizle
            }

            // Sayfa açıldığında kokinaları belli aralıklarla fırlat (ilk 3 saniye boyunca)
            const burst = setInterval(() => {
                createKokina();
                createKokina();
            }, 200);
            setTimeout(() => clearInterval(burst), 3000);
        }

        // --- Zarf Mantığı ---
        const btn = document.getElementById('clickMe');
        const envContainer = document.getElementById('envelope-container');

        btn.addEventListener('click', () => {
            // Butonu gizle, zarfı göster
            btn.style.display = 'none';
            envContainer.style.display = 'block';
            
            // CSS transition'ın çalışması için minik bir gecikme ekliyoruz
            setTimeout(() => {
                envContainer.classList.add('open-envelope');
            }, 100);
        });
    </script>

</body>
</html>
